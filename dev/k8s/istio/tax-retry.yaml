apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: tax-retry
  namespace: yas
spec:
  hosts:
    - tax
    - tax.yas.svc.cluster.local
  gateways:
    - mesh
  http:
    - name: tax-http-retry
      # timeout tong phai lon hon (1 lan goc + 3 retry) x perTryTimeout 2s = 8s,
      # neu de 5s thi cac lan retry cuoi bi cat truoc khi kip chay.
      timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: 5xx,reset,connect-failure,refused-stream,gateway-error
      route:
        - destination:
            host: tax.yas.svc.cluster.local
            port:
              number: 80

