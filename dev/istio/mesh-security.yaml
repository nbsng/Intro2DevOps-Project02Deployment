apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: dev-mtls-strict
  namespace: dev
# Luu y: KHONG dung portLevelMtls o day. PeerAuthentication namespace-wide
# (khong co selector) khong duoc phep khai bao portLevelMtls - istiod se tu choi
# manifest. Probe cua kubelet van hoat dong vi sidecar injector tu rewrite
# httpGet probe sang port 15020; telemetry cho Kiali lay tu Envoy (port 15090)
# nen khong can mo PERMISSIVE cho port metric 8090.
spec:
  mtls:
    mode: STRICT
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: dev-default-mtls
  namespace: dev
spec:
  host: "*"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL

